<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIMA Agent</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#EFEFED;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:360px;border:1px solid #E5E3DE}
.logo{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-text{font-size:16px;font-weight:800;letter-spacing:0.15em;color:#111}
.title{font-size:22px;font-weight:700;color:#111;margin-bottom:6px}
.sub{font-size:13px;color:#888;margin-bottom:28px;line-height:1.5}
label{display:block;font-size:11px;font-weight:600;color:#888;margin-bottom:6px;letter-spacing:0.06em}
input{width:100%;padding:11px 14px;border:1px solid #E5E3DE;border-radius:8px;font-size:14px;font-family:inherit;outline:none;color:#111;margin-bottom:16px}
input:focus{border-color:#CF2959}
.btn{width:100%;padding:12px;background:#CF2959;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn:hover{opacity:0.9}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.error{font-size:12px;color:#A32D2D;margin-top:10px;display:none;text-align:center}
.pink-line{width:24px;height:2px;background:#CF2959;margin-top:5px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="28" height="18" viewBox="0 0 46 30" fill="none">
      <path d="M2 28L11 5L17 16L23 28Z" fill="#CF2959" opacity="0.5"/>
      <path d="M2 28L11 5L20 28Z" fill="#CF2959" opacity="0.8"/>
      <path d="M16 28L23 4L30 28Z" fill="#CF2959"/>
      <path d="M22 28L23 18L24 28Z" fill="#EFEFED"/>
      <path d="M27 28L34 8L41 28Z" fill="#CF2959" opacity="0.7"/>
    </svg>
    <div>
      <div class="logo-text">CIMA</div>
      <div class="pink-line"></div>
    </div>
  </div>
  <div class="title">Acceso al agente</div>
  <div class="sub">Introduce la contraseña del equipo CIMA para continuar.</div>
  <label>CONTRASEÑA</label>
  <input type="password" id="pwd" placeholder="••••••••" autocomplete="current-password"
    onkeydown="if(event.key==='Enter') login()">
  <button class="btn" id="btn" onclick="login()">Entrar</button>
  <div class="error" id="err">Contraseña incorrecta. Inténtalo de nuevo.</div>
</div>

<script>
async function login() {
  const pwd = document.getElementById('pwd').value.trim();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  if (!pwd) return;

  btn.disabled = true;
  btn.textContent = 'Verificando...';
  err.style.display = 'none';

  // Test the password against the API
  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-cima-password': pwd },
      body: JSON.stringify({
        model: 'claude-haiku-4-5-20251001',
        max_tokens: 10,
        messages: [{ role: 'user', content: 'hi' }]
      })
    });

    if (res.status === 401) {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Entrar';
      return;
    }

    // Password correct - save and redirect
    sessionStorage.setItem('cima_session_pwd', pwd);
    window.location.href = '/app.html';
  } catch(e) {
    err.textContent = 'Error de conexión. Inténtalo de nuevo.';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
  }
}
</script>
</body>
</html>
